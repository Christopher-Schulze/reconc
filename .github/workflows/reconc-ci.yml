name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go checks
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -type f -name '*.go'))"

      - name: Check module tidy
        run: go mod tidy -diff

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: make lint

      - name: Race tests
        run: go test -race -count=1 ./...
